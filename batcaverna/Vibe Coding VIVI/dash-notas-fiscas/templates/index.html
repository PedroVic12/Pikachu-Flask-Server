<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF Control </title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #05050a;
            color: #f4f4f5;
        }
    </style>
</head>

<body class="antialiased selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const [files, setFiles] = useState([]);
            const [loading, setLoading] = useState(false);
            const [notas, setNotas] = useState([]);

            const singleFileRef = useRef(null);
            const folderFileRef = useRef(null);
            const pysideFileRef = useRef(null);

            const loadNotasDoBanco = async () => {
                try {
                    const res = await fetch('/api/notas');
                    const data = await res.json();
                    setNotas(data);
                } catch (e) {
                    console.error("Erro ao ler banco de dados:", e);
                }
            };

            useEffect(() => { loadNotasDoBanco(); }, []);

            const handleFileSelection = (e) => {
                const selected = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith(".pdf"));
                setFiles(selected);
            };
            const processarLote = async () => {
                if (files.length === 0) return;
                setLoading(true);

                const formData = new FormData();
                files.forEach(f => formData.append('files', f));

                try {
                    await fetch('/api/bulk_process', { method: 'POST', body: formData });
                    await loadNotasDoBanco();
                    setFiles([]);
                } catch (error) {
                    console.error(error);
                }
                setLoading(false);
            };

            const limparBancoDeDados = async () => {
                if (confirm("🚨 ATENÇÃO: Você tem certeza que deseja APAGAR todas as linhas salvas no notas.db?")) {
                    setLoading(true);
                    try {
                        await fetch('/api/limpar_banco', { method: 'POST' });
                        await loadNotasDoBanco();
                    } catch (e) {
                        console.error(e);
                    }
                    setLoading(false);
                }
            };

            const dispararPySide = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('file', file);
                await fetch('/api/launch_pyside', { method: 'POST', body: formData });
                alert("Janela do PySide6 aberta no desktop corporativo!");
            };

            return (
                <div className="min-h-screen pb-12 px-4 md:px-8 max-w-7xl mx-auto">
                    {/* Topbar / Header */}
                    <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center py-6 border-b border-zinc-800 mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">NF CONTROL da VIVI</h1>
                            <p className="text-xs text-zinc-400 font-mono mt-1">Dashboard de Alta Tecnologia • OPERAÇÃO DE EXTRAÇÃO CONTEXTUA utilizando tecnologia OCR</p>
                        </div>
                        <div className="flex flex-wrap gap-3">
                            <button onClick={() => window.location.href = '/api/exportar'} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold font-mono px-5 py-3 rounded-lg shadow transition-all">
                                EXPORTAR EXCEL (PANDAS)
                            </button>
                            <button onClick={limparBancoDeDados} className="bg-red-950/60 border border-red-700/50 hover:bg-red-900 text-red-200 text-xs font-bold font-mono px-5 py-3 rounded-lg transition-all">
                                RESETAR BANCO (.DB)
                            </button>
                        </div>
                    </header>

                    {/* Dashboard Grid de Ações */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">

                        <div className="lg:col-span-2 bg-zinc-900/40 border border-zinc-800 rounded-2xl p-6 backdrop-blur-md">
                            <h2 className="text-sm font-bold tracking-wider text-zinc-400 uppercase font-mono mb-4">Esteira de Processamento em Lote</h2>
                            <div className="flex flex-wrap gap-3 mb-4">
                                <button onClick={() => singleFileRef.current && singleFileRef.current.click()} className="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-white text-xs font-bold font-mono px-4 py-2.5 rounded-xl transition-all">
                                    Selecionar PDF Único
                                </button>
                                <button onClick={() => folderFileRef.current && folderFileRef.current.click()} className="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-white text-xs font-bold font-mono px-4 py-2.5 rounded-xl transition-all">
                                    Selecionar Pasta Completa
                                </button>
                                <input type="file" accept=".pdf" ref={singleFileRef} onChange={handleFileSelection} className="hidden" />
                                <input type="file" accept=".pdf" webkitdirectory="true" directory="true" multiple ref={folderFileRef} onChange={handleFileSelection} className="hidden" />
                            </div>

                            {files.length > 0 && (
                                <div className="border border-zinc-800 rounded-xl bg-black/60 p-4 max-h-40 overflow-y-auto mb-4 font-mono text-xs text-zinc-400">
                                    <p className="text-indigo-400 font-bold mb-2">Fila de Upload ({files.length} arquivos):</p>
                                    {files.map((f, i) => (
                                        <div key={i} className="flex justify-between py-1 border-b border-zinc-900 truncate">
                                            <span>{f.name}</span>
                                            <span className="text-zinc-600">{(f.size / 1024).toFixed(1)} KB</span>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {files.length > 0 && (
                                <button onClick={processarLote} disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-zinc-800 text-white font-mono font-bold py-3 rounded-xl transition-all text-xs">
                                    {loading ? "EXECUTANDO ENGINES (OCRs / PARSERS)..." : "INICIAR IMPORTAÇÃO AUTOMÁTICA"}
                                </button>
                            )}
                        </div>

                        <div className="bg-indigo-950/20 border border-indigo-900/40 rounded-2xl p-6 flex flex-col justify-between">
                            <div>
                                <h3 className="text-sm font-bold text-indigo-400 font-mono uppercase mb-2">Inspeção Manual Estendida</h3>
                                <p className="text-xs text-zinc-400 leading-relaxed">Abra o ambiente analítico PySide6 para traçar manualmente geometrias de retângulos e visualizar os espectros de texto isolados por ROIs coordenadas.</p>
                            </div>
                            <button onClick={() => pysideFileRef.current && pysideFileRef.current.click()} className="w-full bg-indigo-900/60 hover:bg-indigo-800 text-indigo-200 border border-indigo-700/50 font-mono font-bold py-3 rounded-xl transition-all text-xs mt-4">
                                DISPARAR TOOL PYSIDE6
                            </button>
                            <input type="file" accept=".pdf" ref={pysideFileRef} onChange={dispararPySide} className="hidden" />
                        </div>
                    </div>

                    {/* Loader de Estado */}
                    {loading && (
                        <div className="w-full bg-indigo-900/20 border border-indigo-500/30 p-3 rounded-xl font-mono text-xs text-center text-indigo-300 animate-pulse mb-6">
                            Sincronizando fluxo de dados com o notas.db. Verifique os logs estruturados no seu terminal.
                        </div>
                    )}

                    {/* Tabela de Monitoramento Líquido */}
                    <div className="bg-zinc-900/20 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                        <div className="p-4 bg-zinc-900/50 border-b border-zinc-800 font-mono text-xs font-bold text-zinc-400">
                            REGISTROS ATIVOS EXTRAÍDOS DO BANCO DE DADOS
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse text-xs">
                                <thead className="bg-zinc-950 font-mono uppercase text-zinc-500 border-b border-zinc-800">
                                    <tr>
                                        <th className="p-4">Nota Fiscal</th>
                                        <th className="p-4">Data/Hora Emissão</th>
                                        <th className="p-4">Nome Fantasia (Prestador)</th>
                                        <th className="p-4">Documento Origem</th>
                                        <th className="p-4 text-right">Valor Total</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-zinc-900 font-medium">
                                    {notas.length === 0 ? (
                                        <tr>
                                            <td colSpan="5" className="p-8 text-center text-zinc-600 font-mono">Nenhum registro localizado no SQLite local. Insira os arquivos PDF para iniciar.</td>
                                        </tr>
                                    ) : (
                                        notas.map((n) => (
                                            <tr key={n.id} className="hover:bg-zinc-900/40 transition-colors">
                                                <td className="p-4 font-mono font-bold text-indigo-400">#{n.numero}</td>
                                                <td className="p-4 text-zinc-400 font-mono">{n.data_emissao}</td>
                                                <td className="p-4 text-zinc-200 font-bold tracking-wide">{n.nome_fantasia}</td>
                                                <td className="p-4"><span className="bg-zinc-900 border border-zinc-800 font-mono text-[11px] px-2 py-1 rounded text-zinc-400">{n.filename}</span></td>
                                                <td className="p-4 text-right font-mono font-black text-emerald-400 text-sm">R$ {n.valor}</td>
                                                <td className="p-4 text-right">
                                                    {/* Verifica se algo falhou para mostrar o botão de corrigir */}
                                                    {(n.numero === "Não encontrado" || n.nome_fantasia === "Não encontrado") && (
                                                        <button
                                                            onClick={async () => {
                                                                await fetch(`/api/corrigir_pyside/${n.id}`, { method: 'POST' });
                                                            }}
                                                            className="bg-amber-600/20 text-amber-500 border border-amber-600/50 hover:bg-amber-600 hover:text-white text-xs px-3 py-1 rounded transition-colors"
                                                            title="Abrir PySide6 para corrigir manualmente"
                                                        >
                                                            🔧 Corrigir
                                                        </button>
                                                    )}
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
