<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF Control - Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const [files, setFiles] = useState([]);
            const [loading, setLoading] = useState(false);
            const [notas, setNotas] = useState([]);

            const singleFileRef = useRef(null);
            const folderFileRef = useRef(null);
            const pysideFileRef = useRef(null);

            const loadNotas = async () => {
                const res = await fetch('/api/notas');
                const data = await res.json();
                setNotas(data);
            };

            useEffect(() => { loadNotas(); }, []);

            const handleFileSelect = (e) => {
                const selectedFiles = Array.from(e.target.files).filter(f => f.type === "application/pdf");
                setFiles(selectedFiles);
            };

            // Dispara API Bulk Process
            const processarArquivos = async () => {
                if (files.length === 0) return;
                setLoading(true);

                const formData = new FormData();
                files.forEach(f => formData.append('files', f));

                try {
                    await fetch('/api/bulk_process', { method: 'POST', body: formData });
                    await loadNotas();
                    setFiles([]);
                } catch (error) {
                    console.error("Erro no processamento:", error);
                }
                setLoading(false);
            };

            // Dispara a Ferramenta PySide6
            const abrirPySide6 = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('file', file);

                try {
                    await fetch('/api/launch_pyside', { method: 'POST', body: formData });
                    alert("A janela do PySide6 foi aberta no seu computador. Vá para ela para desenhar as marcações!");
                } catch (error) {
                    console.error("Erro ao abrir PySide6:", error);
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <h1 className="text-3xl font-bold mb-8 text-indigo-700">Controle de Documentos PDF</h1>

                    <div className="grid md:grid-cols-2 gap-6 mb-8">
                        {/* CARD 1: UPLOAD GERAL */}
                        <div className="bg-white p-6 rounded-xl shadow border border-gray-200">
                            <h2 className="text-xl font-bold mb-4 text-gray-800">1. Processamento em Lote / Automático</h2>

                            <div className="flex gap-4 mb-4">
                                <button onClick={() => singleFileRef.current && singleFileRef.current.click()} className="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">
                                    Selecionar 1 Arquivo
                                </button>
                                <button onClick={() => folderFileRef.current && folderFileRef.current.click()} className="bg-blue-800 text-white px-4 py-2 rounded shadow hover:bg-blue-900">
                                    Selecionar Pasta
                                </button>

                                <input type="file" accept=".pdf" ref={singleFileRef} onChange={handleFileSelect} className="hidden" />
                                <input type="file" accept=".pdf" webkitdirectory="true" directory="true" multiple ref={folderFileRef} onChange={handleFileSelect} className="hidden" />
                            </div>

                            {/* Mostra a lista de arquivos e tamanhos */}
                            {files.length > 0 && (
                                <div className="mt-4 border rounded p-3 bg-gray-50 max-h-48 overflow-y-auto">
                                    <p className="font-bold text-sm mb-2">{files.length} arquivo(s) preparado(s):</p>
                                    <ul className="text-sm text-gray-600 space-y-1">
                                        {files.map((f, i) => (
                                            <li key={i} className="flex justify-between border-b pb-1">
                                                <span className="truncate w-3/4">{f.name}</span>
                                                <span className="font-mono text-gray-400">{(f.size / 1024).toFixed(2)} KB</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            )}

                            {files.length > 0 && (
                                <button onClick={processarArquivos} disabled={loading} className="w-full mt-4 bg-green-600 text-white font-bold py-3 rounded shadow hover:bg-green-700">
                                    {loading ? "Processando e Extraindo Textos... (Veja o Terminal)" : "Processar Arquivos"}
                                </button>
                            )}
                        </div>

                        {/* CARD 2: FERRAMENTA PYSIDE6 */}
                        <div className="bg-indigo-50 p-6 rounded-xl shadow border border-indigo-200">
                            <h2 className="text-xl font-bold mb-4 text-indigo-900">2. Extração Manual OpenCV (PySide6)</h2>
                            <p className="text-sm text-gray-700 mb-6">Utilize esta opção para abrir uma janela nativa onde você pode configurar manualmente as coordenadas (X, Y) desenhando vários retângulos.</p>

                            <button onClick={() => pysideFileRef.current && pysideFileRef.current.click()} className="w-full bg-indigo-600 text-white font-bold py-3 rounded shadow hover:bg-indigo-700">
                                Abrir Ferramenta PySide6
                            </button>
                            <input type="file" accept=".pdf" ref={pysideFileRef} onChange={abrirPySide6} className="hidden" />
                        </div>
                    </div>

                    {/* TABELA DE RESULTADOS */}
                    <div className="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-gray-100 border-b">
                                <tr>
                                    <th className="p-4">Data Registro</th>
                                    <th className="p-4">Arquivo</th>
                                    <th className="p-4">Valor Extraído</th>
                                </tr>
                            </thead>
                            <tbody>
                                {notas.map(n => (
                                    <tr key={n.id} className="border-b hover:bg-gray-50">
                                        <td className="p-4 text-gray-500">{new Date(n.created_at).toLocaleString('pt-BR')}</td>
                                        <td className="p-4 font-mono text-blue-600">{n.filename}</td>
                                        <td className="p-4 font-bold text-green-700">{n.dado_limpo}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
