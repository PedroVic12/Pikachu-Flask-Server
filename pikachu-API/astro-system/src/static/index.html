<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro System - NASA, Pokémon e Astrologia</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .result {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
            border-left: 4px solid #ffd700;
        }

        .loading {
            text-align: center;
            font-style: italic;
            color: #ffd700;
        }

        .error {
            color: #ff6b6b;
            font-weight: bold;
        }

        .nasa-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .pokemon-sprite {
            width: 150px;
            height: 150px;
            margin: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            padding: 10px;
        }

        input,
        select {
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            margin: 5px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .astronomy-section {
            grid-column: span 2;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (max-width: 900px) {
            .astronomy-section {
                grid-column: span 1;
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .section {
                padding: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>Pikachu Rest API - Frontend 🌟</h1>
        <h1>🌟 Sistema Astronômico 🌟</h1>
        <p>(astro-system)</p>

        <div class="grid">
            <!-- Seção NASA -->
            <div class="section">
                <h2>🚀 NASA - Foto do Dia</h2>
                <button onclick="getNasaAPOD()">Obter Foto Astronômica do Dia</button>
                <div id="nasa-result" class="result"></div>
            </div>

            <!-- Seção Pokémon -->
            <div class="section">
                <h2>🎮 Pokémon</h2>
                <input type="text" id="pokemon-name" placeholder="Nome do Pokémon" />
                <button onclick="getPokemon()">Buscar Pokémon</button>
                <button onclick="getRandomPokemon()">Pokémon Aleatório</button>
                <div id="pokemon-result" class="result"></div>
            </div>

            <!-- Seção Horóscopo -->
            <div class="section">
                <h2>🔮 Horóscopo</h2>
                <select id="zodiac-sign">
                    <option value="aries">Áries</option>
                    <option value="taurus">Touro</option>
                    <option value="gemini">Gêmeos</option>
                    <option value="cancer">Câncer</option>
                    <option value="leo">Leão</option>
                    <option value="virgo">Virgem</option>
                    <option value="libra">Libra</option>
                    <option value="scorpio">Escorpião</option>
                    <option value="sagittarius">Sagitário</option>
                    <option value="capricorn">Capricórnio</option>
                    <option value="aquarius">Aquário</option>
                    <option value="pisces">Peixes</option>
                </select>
                <button onclick="getHoroscope()">Ver Horóscopo Diário</button>
                <div id="horoscope-result" class="result">
                    <div>
                        <button type="button">Traduzir para o português</button>
                        <button>Baixar horóscopo em audio</button>
                    </div>
                </div>
                <button onclick="getHoroscopeWeekly()">Ver Horóscopo Semanal</button>
                <div id="horoscope-weekly-result" class="result"></div>
            </div>

            <div class="section">
                <h2>🔮 Cartas do Tarot</h2>
                <button onclick="getTarotCards()">Ver Cartas do Tarot</button>
                <div id="tarot-cards-result" class="result"></div>
            </div>

            <!-- Seção Astronomia -->
            <div class="section astronomy-section">
                <h2>🌙 Astronomia</h2>
                <div class="button-group">
                    <button onclick="getMoonPhase()">Fase da Lua</button>
                    <button onclick="getISSLocation()">Localização da ISS</button>
                    <button onclick="getPeopleInSpace()">Pessoas no Espaço</button>
                    <button onclick="getKeplerExoplanets()">Exoplanetas (Kepler)</button>
                    <button onclick="getTransitingExoplanets()">Exoplanetas (Trânsito)</button>
                    <button onclick="getCandidateExoplanets()">Candidatos a Planetas</button>
                    <button onclick="getMarsWeather()">Clima em Marte</button>
                </div>
                <div id="astronomy-result" class="result"></div>

                <h3>Fotos de Marte</h3>
                <div class="button-group">
                    <select id="rover-name" onchange="updateCameraOptions()">
                        <option value="curiosity">Curiosity</option>
                        <option value="opportunity">Opportunity</option>
                        <option value="spirit">Spirit</option>
                    </select>
                    <input type="number" id="rover-sol" placeholder="Sol" value="1000" />
                    <select id="rover-camera"></select>
                    <button onclick="getMarsRoverPhotos()">Buscar Fotos</button>
                </div>
                <div id="mars-photos-result" class="result"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;">
                </div>
            </div>
        </div>
    </div>

    <script>
        const cameraOptions = {
            curiosity: [
                { value: 'FHAZ', text: 'Front Hazard Avoidance Camera' },
                { value: 'RHAZ', text: 'Rear Hazard Avoidance Camera' },
                { value: 'MAST', text: 'Mast Camera' },
                { value: 'CHEMCAM', text: 'Chemistry and Camera Complex' },
                { value: 'MAHLI', text: 'Mars Hand Lens Imager' },
                { value: 'MARDI', text: 'Mars Descent Imager' },
                { value: 'NAVCAM', text: 'Navigation Camera' }
            ],
            opportunity: [
                { value: 'FHAZ', text: 'Front Hazard Avoidance Camera' },
                { value: 'RHAZ', text: 'Rear Hazard Avoidance Camera' },
                { value: 'NAVCAM', text: 'Navigation Camera' },
                { value: 'PANCAM', text: 'Panoramic Camera' },
                { value: 'MINITES', text: 'Miniature Thermal Emission Spectrometer' }
            ],
            spirit: [
                { value: 'FHAZ', text: 'Front Hazard Avoidance Camera' },
                { value: 'RHAZ', text: 'Rear Hazard Avoidance Camera' },
                { value: 'NAVCAM', text: 'Navigation Camera' },
                { value: 'PANCAM', text: 'Panoramic Camera' },
                { value: 'MINITES', text: 'Miniature Thermal Emission Spectrometer' }
            ]
        };

        function updateCameraOptions() {
            const rover = document.getElementById('rover-name').value;
            const cameraSelect = document.getElementById('rover-camera');
            cameraSelect.innerHTML = '';

            const cameras = cameraOptions[rover];
            if (cameras) {
                const allOption = document.createElement('option');
                allOption.value = '';
                allOption.text = 'All Cameras';
                cameraSelect.appendChild(allOption);

                cameras.forEach(camera => {
                    const option = document.createElement('option');
                    option.value = camera.value;
                    option.text = `${camera.text} (${camera.value})`;
                    cameraSelect.appendChild(option);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', updateCameraOptions);

        async function makeRequest(url, resultElementId) {
            const resultElement = document.getElementById(resultElementId);
            resultElement.innerHTML = '<div class="loading">Carregando...</div>';

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    if (data.content) {
                        throw new Error(`${data.error}. Response: ${data.content}`);
                    }
                    throw new Error(data.error || 'Erro na requisição');
                }

                return data;
            } catch (error) {
                resultElement.innerHTML = `<div class="error">Erro: ${error.message}</div>`;
                throw error;
            }
        }

        async function getNasaAPOD() {
            try {
                const data = await makeRequest('/api/nasa/apod', 'nasa-result');
                const resultElement = document.getElementById('nasa-result');

                resultElement.innerHTML = `
                    <h3>${data.title}</h3>
                    <p><strong>Data:</strong> ${data.date}</p>
                    <p>${data.explanation}</p>
                    ${data.media_type === 'image' ? `<img src="${data.url}" alt="${data.title}" class="nasa-image">` : `<a href="${data.url}" target="_blank">Ver vídeo</a>`}
                    ${data.copyright ? `<p><small>© ${data.copyright}</small></p>` : ''}
                `;
            } catch (error) {
                console.error('Erro ao obter APOD:', error);
            }
        }

        async function getPokemon() {
            const pokemonName = document.getElementById('pokemon-name').value.trim();
            if (!pokemonName) {
                alert('Por favor, digite o nome de um Pokémon');
                return;
            }

            try {
                const data = await makeRequest(`/api/pokemon/${pokemonName}`, 'pokemon-result');
                const resultElement = document.getElementById('pokemon-result');

                resultElement.innerHTML = `
                    <h3>${data.name.charAt(0).toUpperCase() + data.name.slice(1)} (#${data.id})</h3>
                    <img src="${data.sprite}" alt="${data.name}" class="pokemon-sprite">
                    <p><strong>Altura:</strong> ${data.height / 10} m</p>
                    <p><strong>Peso:</strong> ${data.weight / 10} kg</p>
                    <p><strong>Tipos:</strong> ${data.types.join(', ')}</p>
                    <p><strong>Habilidades:</strong> ${data.abilities.join(', ')}</p>
                `;
            } catch (error) {
                console.error('Erro ao obter Pokémon:', error);
            }
        }

        async function getRandomPokemon() {
            try {
                const data = await makeRequest('/api/pokemon/random', 'pokemon-result');
                const resultElement = document.getElementById('pokemon-result');

                resultElement.innerHTML = `
                    <h3>${data.name.charAt(0).toUpperCase() + data.name.slice(1)} (#${data.id})</h3>
                    <img src="${data.sprite}" alt="${data.name}" class="pokemon-sprite">
                    <p><strong>Altura:</strong> ${data.height / 10} m</p>
                    <p><strong>Peso:</strong> ${data.weight / 10} kg</p>
                    <p><strong>Tipos:</strong> ${data.types.join(', ')}</p>
                    <p><strong>Habilidades:</strong> ${data.abilities.join(', ')}</p>
                `;
            } catch (error) {
                console.error('Erro ao obter Pokémon aleatório:', error);
            }
        }

        async function getHoroscope() {
            const sign = document.getElementById('zodiac-sign').value;

            try {
                const data = await makeRequest(`/api/horoscope/${sign}`, 'horoscope-result');
                const resultElement = document.getElementById('horoscope-result');

                resultElement.innerHTML = `
                    <h3>Horóscopo para ${sign.charAt(0).toUpperCase() + sign.slice(1)}</h3>
                    <p><strong>Data:</strong> ${data.data.date}</p>
                    <p><strong>Previsão:</strong> ${data.data.horoscope_data}</p>
                `;
            } catch (error) {
                console.error('Erro ao obter horóscopo:', error);
            }
        }

        async function getMoonPhase() {
            try {
                const data = await makeRequest('/api/astronomy/moon-phase', 'astronomy-result');
                const resultElement = document.getElementById('astronomy-result');

                resultElement.innerHTML = `
                    <h3>🌙 Fase da Lua</h3>
                    <p><strong>Fase:</strong> ${data.phase}</p>
                    <p><strong>Data:</strong> ${data.date}</p>
                    <p><strong>Horário:</strong> ${data.time}</p>
                `;
            } catch (error) {
                console.error('Erro ao obter fase da lua:', error);
            }
        }

        async function getISSLocation() {
            try {
                const data = await makeRequest('/api/astronomy/iss-location', 'astronomy-result');
                const resultElement = document.getElementById('astronomy-result');

                resultElement.innerHTML = `
                    <h3>🛰️ Localização da ISS</h3>
                    <p><strong>Latitude:</strong> ${data.iss_position.latitude}°</p>
                    <p><strong>Longitude:</strong> ${data.iss_position.longitude}°</p>
                    <p><strong>Timestamp:</strong> ${new Date(data.timestamp * 1000).toLocaleString('pt-BR')}</p>
                `;
            } catch (error) {
                console.error('Erro ao obter localização da ISS:', error);
            }
        }

        async function getPeopleInSpace() {
            try {
                const data = await makeRequest('/api/astronomy/people-in-space', 'astronomy-result');
                const resultElement = document.getElementById('astronomy-result');

                const peopleList = data.people.map(person =>
                    `<li><strong>${person.name}</strong> - ${person.craft}</li>`
                ).join('');

                resultElement.innerHTML = `
                    <h3>👨‍🚀 Pessoas no Espaço</h3>
                    <p><strong>Total:</strong> ${data.number} pessoas</p>
                    <ul>${peopleList}</ul>
                `;
            } catch (error) {
                console.error('Erro ao obter pessoas no espaço:', error);
            }
        }

        async function getKeplerExoplanets() {
            try {
                const data = await makeRequest('/api/astronomy/exoplanets/kepler', 'astronomy-result');
                const resultElement = document.getElementById('astronomy-result');
                const planets = data.slice(0, 10); // Limitar a 10 para não sobrecarregar a UI
                const planetList = planets.map(planet => `<li>${planet.pl_name}</li>`).join('');
                resultElement.innerHTML = `
                    <h3>🪐 Exoplanetas (Kepler)</h3>
                    <p>Mostrando os 10 primeiros de ${data.length} planetas encontrados.</p>
                    <ul>${planetList}</ul>
                `;
            } catch (error) {
                console.error('Erro ao obter exoplanetas Kepler:', error);
            }
        }

        async function getTransitingExoplanets() {
            try {
                const data = await makeRequest('/api/astronomy/exoplanets/transiting', 'astronomy-result');
                const resultElement = document.getElementById('astronomy-result');
                const planets = data.slice(0, 10); // Limitar a 10
                const planetList = planets.map(planet => `<li>${planet.pl_name}</li>`).join('');
                resultElement.innerHTML = `
                    <h3>🪐 Exoplanetas (Trânsito)</h3>
                    <p>Mostrando os 10 primeiros de ${data.length} planetas encontrados.</p>
                    <ul>${planetList}</ul>
                `;
            } catch (error) {
                console.error('Erro ao obter exoplanetas em trânsito:', error);
            }
        }

        async function getCandidateExoplanets() {
            try {
                const data = await makeRequest('/api/astronomy/exoplanets/candidates', 'astronomy-result');
                const resultElement = document.getElementById('astronomy-result');
                const planets = data.slice(0, 10); // Limitar a 10
                const planetList = planets.map(planet => `<li>${planet.kepoi_name} (KOI)</li>`).join('');
                resultElement.innerHTML = `
                    <h3>🪐 Candidatos a Planetas</h3>
                    <p>Mostrando os 10 primeiros de ${data.length} candidatos encontrados.</p>
                    <ul>${planetList}</ul>
                `;
            } catch (error) {
                console.error('Erro ao obter candidatos a exoplanetas:', error);
            }
        }

        async function getMarsWeather() {
            try {
                const data = await makeRequest('/api/astronomy/mars-weather', 'astronomy-result');
                const resultElement = document.getElementById('astronomy-result');

                if (data.sol_keys && data.sol_keys.length > 0) {
                    const latestSol = data.sol_keys[data.sol_keys.length - 1];
                    const weather = data[latestSol];
                    resultElement.innerHTML = `
                        <h3>🌦️ Clima em Marte (InSight)</h3>
                        <p><strong>Sol:</strong> ${latestSol}</p>
                        <p><strong>Temperatura Média:</strong> ${weather.AT.av.toFixed(2)} °C</p>
                        <p><strong>Vento Horizontal Médio:</strong> ${weather.HWS.av.toFixed(2)} m/s</p>
                        <p><strong>Pressão Média:</strong> ${weather.PRE.av.toFixed(2)} Pa</p>
                        <p><strong>Estação:</strong> ${weather.Season}</p>
                    `;
                } else {
                    resultElement.innerHTML = `
                        <h3>🌦️ Clima em Marte (InSight)</h3>
                        <p>Dados de clima não disponíveis no momento.</p>
                        <p>A missão InSight foi concluída em 2022, então novos dados não são esperados. Esta API pode estar desativada ou sem dados recentes.</p>
                     `;
                }
            } catch (error) {
                const resultElement = document.getElementById('astronomy-result');
                resultElement.innerHTML = `
                        <h3>🌦️ Clima em Marte (InSight)</h3>
                        <p>Erro ao buscar dados de clima. A API pode estar desativada.</p>
                        <p>A missão InSight foi concluída em 2022.</p>
                     `;
                console.error('Erro ao obter clima em Marte:', error);
            }
        }

        async function getMarsRoverPhotos() {
            const rover = document.getElementById('rover-name').value.trim();
            const sol = document.getElementById('rover-sol').value.trim();
            const camera = document.getElementById('rover-camera').value.trim();

            let url = `/api/astronomy/mars-rover/photos?rover=${rover}&sol=${sol}`;
            if (camera) {
                url += `&camera=${camera}`;
            }

            try {
                const data = await makeRequest(url, 'mars-photos-result');
                const resultElement = document.getElementById('mars-photos-result');

                if (data.photos && data.photos.length > 0) {
                    const photosHTML = data.photos.map(photo => `
                        <div>
                            <img src="${photo.img_src}" style="width: 100%; border-radius: 10px;" alt="Foto de Marte pelo rover ${photo.rover.name}">
                            <p style="font-size: 12px; margin-top: 5px;">${photo.camera.full_name} (Sol ${photo.sol})</p>
                        </div>
                    `).join('');
                    resultElement.innerHTML = photosHTML;
                } else {
                    resultElement.innerHTML = '<p>Nenhuma foto encontrada para esta combinação de rover, sol e câmera.</p>';
                }

            } catch (error) {
                console.error('Erro ao obter fotos de Marte:', error);
            }
        }
    </script>
</body>

</html>
